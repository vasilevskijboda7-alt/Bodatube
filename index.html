<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraTube Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --yt-red: #ff0000; 
            --accent: #00bcd4; 
            --bg: #0f0f0f; 
            --sidebar-w: 240px; 
            --card-bg: #1a1a1a;
            --hover: #272727;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex;
        }
        
        /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) --- */
        .sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--bg);
            position: fixed;
            top: 56px;
            left: 0;
            padding: 12px;
            box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 900;
        }

        .side-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .side-item:hover { background: var(--hover); }
        .side-item.active { background: var(--hover); }
        .side-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 12px 0; }
        .side-title { padding-left: 15px; font-size: 16px; font-weight: 600; margin-bottom: 10px; display: block; }

        /* --- ШАПКА --- */
        header { 
            height: 56px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 16px; 
            background: var(--bg); 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000; 
            box-sizing: border-box; 
        }
        .logo { font-weight: 600; font-size: 20px; cursor: pointer; color: white; text-decoration: none; display: flex; align-items: center; }
        .logo span { color: var(--yt-red); margin-right: 4px; font-size: 24px; }
        
        .upload-btn { 
            background: #272727; color: white; border: none; padding: 8px 16px; border-radius: 20px; 
            cursor: pointer; font-weight: 500; transition: 0.3s;
        }
        .upload-btn:hover { background: #3f3f3f; }

        /* --- ОСНОВНОЙ КОНТЕНТ (СДВИНУТ ВПРАВО) --- */
        .main-wrapper {
            margin-left: var(--sidebar-w);
            margin-top: 56px;
            width: 100%;
            padding: 24px;
            box-sizing: border-box;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .card { cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .card video { width: 100%; height: 100%; object-fit: cover; }

        /* --- ПЛЕЕР --- */
        #watch-page { display: none; max-width: 1100px; margin: 0 auto; }
        .ultra-player { 
            position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; 
        }
        .ultra-player video { width: 100%; height: 100%; }
        
        /* ПАНЕЛЬ УПРАВЛЕНИЯ ПЛЕЕРОМ */
        .player-controls {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0; transition: 0.3s;
        }
        .ultra-player:hover .player-controls { opacity: 1; }
        
        .prog-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.3); cursor: pointer; margin-bottom: 10px; }
        .prog-bar { height: 100%; background: var(--yt-red); width: 0%; }

        /* ИНФО */
        .v-info { margin-top: 20px; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { background: #272727; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .btn:hover { background: #3f3f3f; }

        /* КОММЕНТЫ */
        .comm-sect { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .comm-inp { width: 100%; background: none; border: none; border-bottom: 1px solid #333; color: white; padding: 10px; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()"><span>▶</span>UltraTube</div>
    <button class="upload-btn" onclick="document.getElementById('fileInp').click()">+ Создать</button>
    <input type="file" id="fileInp" accept="video/*" style="display: none">
</header>

<div class="sidebar">
    <div class="side-item active" onclick="location.reload()">🏠 Главная</div>
    <div class="side-item">📱 Shorts</div>
    <div class="side-item">🔔 Подписки</div>
    <div class="side-sep"></div>
    <span class="side-title">Вы</span>
    <div class="side-item">🕒 История</div>
    <div class="side-item">🎬 Ваши видео</div>
    <div class="side-item">👍 Понравившиеся</div>
    <div class="side-sep"></div>
    <div class="side-item">⚙️ Настройки</div>
</div>

<div class="main-wrapper">
    <div id="feed-page">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="watch-page">
        <div class="ultra-player" id="pCont">
            <video id="mainVid"></video>
            <div class="player-controls">
                <div class="prog-bg" id="progLine"><div class="prog-bar" id="pBar"></div></div>
                <button onclick="togglePlay()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">▶/⏸</button>
            </div>
        </div>
        <div class="v-info">
            <h1 id="vTitle" style="margin:0">Название видео</h1>
            <div class="action-btns">
                <button class="btn" id="likeBtn">👍 <span id="lCount">0</span></button>
                <button class="btn">↪ Поделиться</button>
                <button class="btn">⚙️ 1080p</button>
            </div>
            <div class="comm-sect">
                <h3>Комментарии</h3>
                <input type="text" id="cInp" class="comm-inp" placeholder="Оставьте комментарий...">
                <div id="cList" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const CLOUD_NAME = 'dto6n7dvl'; 
    const UPLOAD_PRESET = 'mytube_preset'; 
    const S_URL = 'https://dbxirqykwurwcbtqvimx.supabase.co';
    const S_KEY = 'sb_publishable_hJ1YVye1gLOeuRDQtYTjYg_7YDwc1hG';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currentVid = null;
    const video = document.getElementById('mainVid');

    // Главная
    async function loadFeed() {
        const { data } = await sb.from('videos').select('*').order('created_at', { ascending: false });
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = data.map(v => `
            <div class="card" onclick='openVid(${JSON.stringify(v)})'>
                <div class="thumb"><video src="${v.url}#t=0.5"></video></div>
                <h4 style="margin:10px 0 5px">${v.name}</h4>
                <div style="color:#aaa; font-size:12px;">1.2 тыс. просмотров</div>
            </div>
        `).join('');
    }

    function openVid(v) {
        currentVid = v;
        document.getElementById('feed-page').style.display = 'none';
        document.getElementById('watch-page').style.display = 'block';
        video.src = v.url;
        video.play();
        document.getElementById('vTitle').innerText = v.name;
        document.getElementById('lCount').innerText = v.likes || 0;
        loadComments(v.id);
    }

    // Плеер
    function togglePlay() { video.paused ? video.play() : video.pause(); }
    video.ontimeupdate = () => {
        document.getElementById('pBar').style.width = (video.currentTime / video.duration) * 100 + '%';
    };
    document.getElementById('progLine').onclick = (e) => {
        const rect = document.getElementById('progLine').getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    };

    // Лайки
    document.getElementById('likeBtn').onclick = async () => {
        const count = document.getElementById('lCount');
        const newL = parseInt(count.innerText) + 1;
        count.innerText = newL;
        await sb.from('videos').update({ likes: newL }).eq('id', currentVid.id);
    };

    // Комменты
    async function loadComments(vidId) {
        const { data } = await sb.from('comments').select('*').eq('video_id', vidId).order('created_at', {ascending: false});
        document.getElementById('cList').innerHTML = data.map(c => `<div style="margin-bottom:15px"><b>User</b><br>${c.text}</div>`).join('');
    }
    document.getElementById('cInp').onkeypress = async (e) => {
        if(e.key === 'Enter' && e.target.value.trim()){
            await sb.from('comments').insert([{ video_id: currentVid.id, text: e.target.value }]);
            e.target.value = "";
            loadComments(currentVid.id);
        }
    };

    // Загрузка
    document.getElementById('fileInp').onchange = async (e) => {
        const file = e.target.files[0];
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        alert("Загрузка пошла...");
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: 'POST', body: fd }).then(r => r.json());
        await sb.from('videos').insert([{ name: file.name, url: res.secure_url, likes: 0 }]);
        location.reload();
    };

    loadFeed();
</script>
</body>
</html>
