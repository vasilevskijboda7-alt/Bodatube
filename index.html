<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UltraTube Premium — Clean Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00f2ff; 
            --yt-red: #ff0055; 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(15px);
        }

        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; overflow-x: hidden; }
        
        /* HEADER */
        header { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: rgba(0,0,0,0.9); position: fixed; width: 100%; top: 0; z-index: 1000; 
            backdrop-filter: var(--blur); border-bottom: 1px solid rgba(255,255,255,0.1); box-sizing: border-box;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 18px; color: var(--accent); text-decoration: none; text-shadow: 0 0 10px var(--accent); cursor: pointer; }
        .upload-btn { background: white; color: black; border: none; padding: 7px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; }

        /* SIDEBAR */
        .sidebar { width: 240px; height: 100vh; background: #000; position: fixed; top: 60px; left: 0; padding: 20px; border-right: 1px solid #111; box-sizing: border-box; }
        .side-item { padding: 12px; border-radius: 10px; cursor: pointer; color: #777; transition: 0.3s; font-size: 14px; }
        .side-item:hover { background: var(--glass); color: white; }

        /* MAIN CONTENT */
        .main-wrapper { margin-left: 240px; margin-top: 60px; width: 100%; padding: 25px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 15px; overflow: hidden; }
        .card video { width: 100%; height: 100%; object-fit: cover; }

        /* ULTRA PLAYER */
        #watch-page { display: none; width: 100%; max-width: 1000px; margin: 0 auto; }
        .back-link { color: #555; font-size: 12px; cursor: pointer; margin-bottom: 15px; display: inline-block; font-weight: 600; }
        .back-link:hover { color: var(--accent); }

        .player-box { position: relative; width: 100%; background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .player-box video { width: 100%; height: 100%; }

        .controls {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0; transition: 0.4s; box-sizing: border-box;
        }
        .player-box:hover .controls { opacity: 1; }

        .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; box-shadow: 0 0 10px var(--accent); }

        .btn-row { display: flex; justify-content: space-between; align-items: center; }
        .play-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; padding: 10px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">ULTRA.TUBE</div>
    <div id="status" style="font-size: 11px; color: var(--accent);"></div>
    <button class="upload-btn" onclick="document.getElementById('fileInp').click()">UPLOAD</button>
    <input type="file" id="fileInp" accept="video/*" style="display: none">
</header>

<div class="sidebar">
    <div class="side-item" onclick="goHome()">💠 Discover</div>
    <div class="side-item">🔥 Trending</div>
    <div style="height:1px; background:#222; margin:15px 0;"></div>
    <div class="side-item">🕒 History</div>
    <div class="side-item">👍 Liked</div>
</div>

<div class="main-wrapper">
    <div id="feed-page"><div class="grid" id="mainGrid"></div></div>

    <div id="watch-page">
        <span class="back-link" onclick="goHome()">← RETURN TO DISCOVER</span>
        <div class="player-box" id="pCont">
            <video id="mainVid" playsinline onclick="handlePlay()"></video>
            <div class="controls">
                <div class="progress-container" id="progWrap">
                    <div class="progress-fill" id="progBar"></div>
                </div>
                <div class="btn-row">
                    <button class="play-btn" onclick="handlePlay()" id="pIcon">▶</button>
                    <button class="play-btn" style="font-size: 18px;" onclick="handleFS()">⛶</button>
                </div>
            </div>
        </div>
        <div style="margin-top:20px;">
            <h1 id="vTitle" style="margin:0; font-size:24px;">Video Title</h1>
            <button id="likeBtn" style="background:var(--yt-red); border:none; color:white; padding:10px 20px; border-radius:20px; margin-top:15px; cursor:pointer; font-weight:600;">LIKE <span id="lCount">0</span></button>
            <div id="cList" style="margin-top:20px; border-top:1px solid #222; padding-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    const CLOUD_NAME = 'dto6n7dvl'; 
    const UPLOAD_PRESET = 'mytube_preset'; 
    const S_URL = 'https://dbxirqykwurwcbtqvimx.supabase.co';
    const S_KEY = 'sb_publishable_hJ1YVye1gLOeuRDQtYTjYg_7YDwc1hG';
    const sb = supabase.createClient(S_URL, S_KEY);

    const video = document.getElementById('mainVid');
    let currentVidId = null;

    // ГЛАВНЫЕ ФУНКЦИИ УПРАВЛЕНИЯ
    function goHome() {
        video.pause();
        video.src = "";
        document.getElementById('watch-page').style.display = 'none';
        document.getElementById('feed-page').style.display = 'block';
        loadFeed();
    }

    function handlePlay() {
        if(video.paused) { video.play(); pIcon.innerText='⏸'; }
        else { video.pause(); pIcon.innerText='▶'; }
    }

    function handleFS() {
        if (!document.fullscreenElement) document.getElementById('pCont').requestFullscreen();
        else document.exitFullscreen();
    }

    // ОБНОВЛЕНИЕ ТАЙМЛАЙНА
    video.ontimeupdate = () => {
        const percent = (video.currentTime / video.duration) * 100;
        document.getElementById('progBar').style.width = percent + '%';
    };

    document.getElementById('progWrap').onclick = (e) => {
        const rect = progWrap.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    };

    // ЗАГРУЗКА ЛЕНТЫ
    async function loadFeed() {
        const { data } = await sb.from('videos').select('*').order('created_at', { ascending: false });
        document.getElementById('mainGrid').innerHTML = data.map(v => `
            <div class="card" onclick='openVideo(${JSON.stringify(v)})'>
                <div class="thumb"><video src="${v.url}#t=0.5" muted playsinline></video></div>
                <div style="font-weight:600; margin-top:12px; font-size:14px;">${v.name}</div>
            </div>
        `).join('');
    }

    function openVideo(v) {
        currentVidId = v.id;
        document.getElementById('feed-page').style.display = 'none';
        document.getElementById('watch-page').style.display = 'block';
        video.src = v.url;
        video.play();
        pIcon.innerText = '⏸';
        vTitle.innerText = v.name;
        lCount.innerText = v.likes || 0;
        loadComments(v.id);
        window.scrollTo(0,0);
    }

    // ЛАЙКИ И КОММЕНТЫ
    document.getElementById('likeBtn').onclick = async () => {
        const newCount = parseInt(lCount.innerText) + 1;
        lCount.innerText = newCount;
        await sb.from('videos').update({ likes: newCount }).eq('id', currentVidId);
    };

    async function loadComments(vidId) {
        const { data } = await sb.from('comments').select('*').eq('video_id', vidId);
        cList.innerHTML = `<h3>Comments</h3>` + data.map(c => `<div style="font-size:13px; margin-bottom:10px; color:#aaa;"><b>User:</b> ${c.text}</div>`).join('');
    }

    // ЗАГРУЗКА ВИДЕО
    document.getElementById('fileInp').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "UPLOADING...";
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: 'POST', body: fd }).then(r => r.json());
            if(res.secure_url) {
                await sb.from('videos').insert([{ name: file.name, url: res.secure_url, likes: 0 }]);
                status.innerText = "✅ PUBLISHED!";
                setTimeout(() => location.reload(), 1000);
            }
        } catch (err) {
            status.innerText = "❌ ERROR";
        }
    };

    loadFeed();
</script>
</body>
</html>
